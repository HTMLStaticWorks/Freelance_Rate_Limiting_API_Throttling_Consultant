<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request Access | Limitless API Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#030014' },
                        cyan: { 400: '#c084fc', 500: '#a855f7' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-950 text-slate-200">

    <div class="min-h-screen flex items-center justify-center py-20 px-6 bg-slate-950">
        <div class="max-w-md w-full relative z-10">
            <a href="index.html" class="flex items-center justify-center space-x-2 mb-12">
                <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center glow-cyan">
                    <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                </div>
                <span class="text-2xl font-bold text-white font-sora">Limitless<span class="text-cyan-400">API</span></span>
            </a>
            
            <div class="glass-dark p-8 md:p-12 rounded-[2.5rem] border-slate-800 shadow-2xl relative overflow-hidden">
                <div class="absolute -bottom-24 -left-24 w-48 h-48 bg-cyan-500/10 blur-[80px] rounded-full"></div>
                
                <h1 class="text-3xl font-bold text-white mb-2 font-sora text-center">Request Access</h1>
                <p class="text-slate-500 mb-10 text-center text-sm">Join the waitlist for the private beta.</p>
                
                <form class="space-y-6">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">First Name</label>
                            <input type="text" placeholder="John" class="w-full glass-dark border-slate-800 rounded-xl py-4 px-4 outline-none focus:border-cyan-500 text-white transition-all">
                        </div>
                        <div class="space-y-2">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Last Name</label>
                            <input type="text" placeholder="Doe" class="w-full glass-dark border-slate-800 rounded-xl py-4 px-4 outline-none focus:border-cyan-500 text-white transition-all">
                        </div>
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Work Email</label>
                        <input type="email" placeholder="john@company.com" class="w-full glass-dark border-slate-800 rounded-xl py-4 px-4 outline-none focus:border-cyan-500 text-white transition-all">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Company Domain</label>
                        <input type="text" placeholder="company.com" class="w-full glass-dark border-slate-800 rounded-xl py-4 px-4 outline-none focus:border-cyan-500 text-white transition-all">
                    </div>
                    
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Estimated Monthly RPS</label>
                        <select class="w-full glass-dark border-slate-800 rounded-xl py-4 px-4 outline-none focus:border-cyan-500 text-white transition-all appearance-none">
                            <option>< 1,000 RPS</option>
                            <option>1,000 - 10,000 RPS</option>
                            <option>10,000 - 100,000 RPS</option>
                            <option>100,000+ RPS</option>
                        </select>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-all shadow-lg glow-cyan">
                        Join Waitlist
                    </button>
                </form>
                
                <div class="relative my-10 text-center">
                    <span class="bg-[#030014] px-4 text-[10px] text-slate-500 uppercase font-bold relative z-10">Or continue with</span>
                    <div class="absolute top-1/2 left-0 w-full h-[1px] bg-slate-900"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button class="glass py-3 rounded-xl border-slate-800 flex items-center justify-center space-x-2 hover:bg-white/5 transition-all">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span class="text-sm font-bold">Google</span>
                    </button>
                    <button class="glass py-3 rounded-xl border-slate-800 flex items-center justify-center space-x-2 hover:bg-white/5 transition-all">
                        <svg class="w-5 h-5 fill-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.05 20.28c-.98.95-2.05 1.72-3.41 1.72-1.31 0-1.74-.83-3.29-.83-1.56 0-2.04.81-3.29.83-1.31.02-2.31-.72-3.32-1.72C1.68 18.22 0 15.11 0 12.11c0-3.38 2.11-5.46 4.18-5.46 1.08 0 2.11.72 2.76.72s1.77-.72 3.01-.72c1.11 0 2.3.44 3.16 1.44-.09.07-1.89 1.11-1.89 3.25 0 2.59 2.16 3.51 2.21 3.53-.02.05-.34 1.18-1.15 2.34-.69 1-1.42 2.02-2.23 3.07zM11.95 4.39c-.11-1.63 1.25-3.13 2.79-3.39.11 1.63-1.25 3.13-2.79 3.39z"/></svg>
                        <span class="text-sm font-bold">Apple</span>
                    </button>
                </div>
            </div>
            
            <p class="text-center text-slate-500 text-sm mt-10">
                Already have access? <a href="login.html" class="text-cyan-400 font-bold hover:text-cyan-300">Sign In</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();
    </script>
</body>
</html>
