<!DOCTYPE html>
<html lang="en" class="scroll-smooth dark dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Flux Portal</title>
    <link rel='icon' type='image/png' href='assets/img/favicon.png'>
    <script src="https://cdn.tailwindcss.com"></script>
        <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        slate: { 950: '#030014' },
                        cyan: { 400: '#c084fc', 500: '#a855f7' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], sora: ['Sora', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    
        <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'dark';
            const dir = localStorage.getItem('dir') || 'ltr';
            if (theme === 'light') {
                document.documentElement.classList.remove('dark');
                document.documentElement.setAttribute('data-theme', 'light');
            } else {
                document.documentElement.classList.add('dark');
                document.documentElement.removeAttribute('data-theme');
            }
            if (dir === 'rtl') {
                document.documentElement.setAttribute('dir', 'rtl');
            }
        })();
    </script>
    <link rel='stylesheet' href='assets/css/style.css'>
</head>
<body class="bg-slate-950 text-slate-200">
    <!-- Theme/RTL Toggle Floating -->
    <div class="fixed top-6 right-6 z-50 flex items-center space-x-4">
        <button id="theme-toggle" class="glass text-slate-400" title="Toggle Theme">
            <i data-lucide="sun" class="w-5 h-5"></i>
        </button>
        <button id="rtl-toggle" class="glass text-slate-400" title="Toggle RTL">
            <i data-lucide="arrow-left-right" class="w-5 h-5"></i>
        </button>
    </div>

    <div class="min-h-screen flex items-center justify-center py-20 px-6 bg-slate-950">
        <div class="max-w-md w-full relative z-10">
            <div class="glass-dark p-8 md:p-12 rounded-[2.5rem] border-slate-800 shadow-2xl relative overflow-hidden">
                <div class="absolute -top-24 -right-24 w-48 h-48 bg-purple-500/10 blur-[80px] rounded-full"></div>
                
                <div class="flex flex-col items-center mb-10">
                    <a href="index.html" class="flex items-center space-x-2 mb-6">
                        <div class="w-10 h-10 bg-gradient-to-r from-purple-500 to-indigo-600 rounded-lg flex items-center justify-center glow-cyan">
                            <i data-lucide="shield-check" class="text-white w-6 h-6"></i>
                        </div>
                        <span class="text-xl font-bold tracking-tight text-white font-sora">FLUX</span>
                    </a>
                    <h1 class="text-2xl sm:text-3xl font-bold text-white mb-2 font-sora text-center">Welcome Back</h1>
                    <p class="text-slate-500 text-center text-sm">Access your API policy dashboard and traffic analytics.</p>
                </div>
                
                <form class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Email Address</label>
                        <div class="relative">
                            <i data-lucide="mail" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-4 h-4 z-10"></i>
                            <input type="email" placeholder="name@company.com" class="w-full glass-dark border-slate-800 rounded-xl py-4 pl-12 pr-4 outline-none focus:border-cyan-500 text-white transition-all">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <div class="flex justify-between items-center">
                            <label class="text-xs font-bold text-slate-500 uppercase tracking-widest">Password</label>
                        </div>
                        <div class="relative">
                            <i data-lucide="lock" class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-600 w-4 h-4 z-10"></i>
                            <input type="password" id="password" placeholder="••••••••" class="w-full glass-dark border-slate-800 rounded-xl py-4 pl-12 pr-12 outline-none focus:border-cyan-500 text-white transition-all">
                            <button type="button" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-white transition-colors toggle-password" data-target="password">
                                <i data-lucide="eye" style="width: 20px; height: 20px;"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="flex flex-col sm:flex-row items-center justify-between gap-4 py-2">
                        <div class="flex items-center space-x-2">
                            <input id="remember" type="checkbox" class="w-4 h-4 rounded border-slate-800 bg-slate-900/50 text-purple-600 focus:ring-purple-500/20 focus:ring-offset-0 transition-all cursor-pointer">
                            <label for="remember" class="text-xs text-slate-400 cursor-pointer select-none">Remember Me</label>
                        </div>
                        <a href="#" class="text-xs font-bold text-cyan-400 hover:text-cyan-300">Forgot Password?</a>
                    </div>
                    
                    <button type="submit" class="w-full bg-gradient-to-r from-purple-500 to-indigo-600 text-white py-4 rounded-xl font-bold text-lg hover:opacity-90 transition-all shadow-lg glow-cyan">
                        Login
                    </button>
                </form>
                
                <div class="relative my-10 text-center">
                    <span class="bg-slate-950 px-4 text-[10px] text-slate-300 uppercase font-bold relative z-10">Or continue with</span>
                    <div class="absolute top-1/2 left-0 w-full h-[1px] bg-slate-900"></div>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <button class="glass py-3 rounded-xl border-slate-800 flex items-center justify-center space-x-2 hover:bg-white/5 transition-all">
                        <svg class="w-5 h-5" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
                        <span class="text-sm font-bold">Google</span>
                    </button>
                    <button class="glass py-3 rounded-xl border-slate-800 flex items-center justify-center space-x-2 hover:bg-white/5 transition-all">
                        <svg class="w-5 h-5 text-white" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                            <path d="M12.152 6.896c-.948 0-2.415-1.078-3.96-1.04-2.04.027-3.91 1.183-4.961 3.014-2.117 3.675-.546 9.103 1.519 12.09 1.013 1.454 2.208 3.09 3.792 3.039 1.52-.065 2.09-.987 3.935-.987 1.831 0 2.35.987 3.96.948 1.637-.026 2.676-1.48 3.676-2.948 1.156-1.688 1.636-3.325 1.662-3.415-.039-.013-3.182-1.221-3.22-4.857-.026-3.04 2.48-4.494 2.597-4.559-1.429-2.09-3.623-2.324-4.39-2.376-2-.156-3.675 1.09-4.61 1.09zM15.53 3.83c.843-1.012 1.4-2.427 1.245-3.83-1.207.052-2.662.805-3.532 1.818-.78.896-1.454 2.338-1.273 3.714 1.338.104 2.715-.688 3.559-1.701z" fill="currentColor"/>
                        </svg>
                        <span class="text-sm font-bold">Apple</span>
                    </button>
                </div>
                
                <p class="text-center text-slate-500 text-sm mt-10">
                    Don't have an account? <a href="signup.html" class="text-cyan-400 font-bold hover:text-cyan-300">Request Access</a>
                </p>
            </div>
        </div>
    </div>

    <!-- Back to Top -->
    <button id="back-to-top" title="Back to Top">
        <i data-lucide="arrow-up"></i>
    </button>

    <script src="assets/js/main.js"></script>
    <script>
        lucide.createIcons();

        // Password visibility toggle
        document.querySelectorAll('.toggle-password').forEach(button => {
            button.addEventListener('click', () => {
                const input = document.getElementById(button.getAttribute('data-target'));
                const icon = button.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.setAttribute('data-lucide', 'eye-off');
                } else {
                    input.type = 'password';
                    icon.setAttribute('data-lucide', 'eye');
                }
                lucide.createIcons();
            });
        });
    </script>
</body>
</html>
